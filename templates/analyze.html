
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static',filename= 'analyses.css') }}">
    <title>Analyze</title>
</head>
<body>
        <section id="section1">
            <div class="section1">
                <img src="{{url_img}}" >
                <div class="difenation">
                    {% if real_name %}
                        <h1 class="realname">{{real_name}}</h1>
                    {%else%}
                        <h1 class="realname">{{name}}</h1>
                    {%endif%}
                    <h1 class="name">@{{name}}</h1>
                    {% if bio %}
                        <h3 class="bio">{{bio}}</h3>
                    {%else%}
                        <h3 class="nobio"></h3>
                    {%endif%}
                    <div class="follow">
                        <h3> <i class="bi bi-activity"></i> FOLLOWING: {{following}}</h3>
                        <h3> <i class="bi bi-person-arms-up"></i> FOLLOWERS : {{followers}}</h3>
                        <h3><i class="bi bi-calendar"></i> {{years_created_github}} YEARS IN GITHUB</h3>

                    </div>
                </div>
            <a class="view" href="https://github.com/{{name}}">View GitHub <i class="bi bi-arrow-up-right-circle-fill"></i></a>
            </div>
        </section>
